<!DOCTYPE html>
<html lang="pt">
	<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Titulo janota{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/uteis.js') }}"></script>
	</head>
	<body>
        <header>
            <div class="cxFlex80">
                <img src="{{ url_for('static', filename='img/logo.png')}}" alt="Logótipo" id="imgLogo">
                <p id="slogan">Projeto Camalheia :: viaje pelo mundo ficando alojado na... cama alheia</p>

                <form action="" name="formLogin" id="id_formLogin" method="POST" enctype="application/x-www-form-urlencoded">
                    <div id="agrupaInputs">
                        <input type="text" name="fuser" placeholder="user" class="input-login" required>
                        <input type="password" name="fpass" placeholder="password" class="input-login" required>
                    </div>
                    <input type="submit" value="entrar">
                </form>
            </div>
        </header>

        <main>
            <div id="barraPesquisa">
                <nav>
                    <a href="{{  url_for('cidades.homepage') }}">Home</a>
                    <a href="adicionar.php">Adicionar</a>
                    <a href="atualizar.php">Atualizar</a>
                    <a href="eliminar.php">Eliminar</a>
                    <a href="ad_fotos.php">Fotos</a>
                </nav>

                <form name="formPesquisa" action="pesquisa.php" method="GET" enctype="application/x-www-form-urlencoded" action="">
                    <input type="text" name="fpesquisa" class="input-pesquisa">
                    <input type="submit" value="pesquisa">
                </form>
            </div>

            {% block intro %}
            {% endblock %}
            
            
            {% block content %}
            {% endblock %}

        </main> <!-- fim da cxsite -->
        <footer>
            <p>O Projeto Camalheia é exclusivamente patrocinado por Durex Lda, Harmony SA e Control Lda</p>
        </footer>
	</body>
</html>
