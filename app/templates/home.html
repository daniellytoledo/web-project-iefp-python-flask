

{% extends "base.html" %}

{% block title %}Cidades Flask{% endblock %}

{% block content %}
    {% for cidade in lista_cidades %}
        <div class="cxinhaCidade">
            <a href=""></a>
            <p class="tituloCxinha"> {{cidade.nome_c}} </p>
            <p class="tituloCxinha"> {{cidade.habitante_c}} habitantes </p>
            <p class="tituloCxinha"> {{cidade.pais_c}} </p>
        </div>
    {% endfor %}

{% endblock %}
